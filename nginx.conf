server {
    listen 80;
    server_name localhost;

    # Para origem dedicada: serve ficheiros PWA na raiz com scope "/"
    location ~* ^/(sw\.js|registerSW\.js|manifest\.webmanifest|workbox-[^/]+\.js)$ {
        alias /usr/share/nginx/html/$1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    # Service worker e manifesto: sem cache (Vite coloca na raiz do dist/)
    location ~* ^/app/(sw\.js|registerSW\.js|manifest\.webmanifest|workbox-[^/]+\.js)$ {
        alias /usr/share/nginx/html/$1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/app/";
    }

    # Assets com hash no nome (gerados pelo Vite): cache imutável de 1 ano
    location /app/assets/ {
        alias /usr/share/nginx/html/assets/;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Ícones e imagens estáticas
    location /app/img/ {
        alias /usr/share/nginx/html/img/;
        add_header Cache-Control "public, max-age=86400";
    }

    # SPA: /app/* → raiz do dist (Vite build não cria subpasta /app/)
    location /app/ {
        alias /usr/share/nginx/html/;
        index index.html;
        try_files $uri @spa;
    }

    location @spa {
        root /usr/share/nginx/html;
        rewrite ^ /index.html break;
    }

    # Para origem dedicada (app.drcae.local/): serve o SPA directamente sem redirect.
    # A location /app/ (mais específica) tem prioridade no shared gateway.
    location / {
        root /usr/share/nginx/html;
        try_files $uri @spa;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
